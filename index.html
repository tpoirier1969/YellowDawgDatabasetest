<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fishing Log Map</title>
  <meta name="description" content="Fishing log map with click-first add flow.">
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Fishing Log Map</h1>
        <p class="subhead">Pick the spot first. Then fill in the big form. Like civilized people.</p>
      </div>
      <div class="topbar-actions">
        <button id="addLogBtn" class="button button-primary" type="button">Add Log</button>
        <button id="fitLogsBtn" class="button" type="button">Show All Logs</button>
      </div>
    </header>

    <main class="layout">
      <section class="map-panel">
        <div id="map"></div>

        <div id="placementPrompt" class="placement-prompt hidden" role="dialog" aria-live="polite" aria-label="Place log prompt">
          <div class="placement-prompt__title">Place a new log</div>
          <p id="placementPromptText">Click the map where you want to place this log.</p>
          <div class="placement-prompt__actions">
            <button id="cancelPlacementBtn" class="button" type="button">Cancel</button>
          </div>
        </div>

        <div id="toast" class="toast hidden" aria-live="polite"></div>
      </section>

      <aside class="sidebar">
        <div class="panel">
          <div class="panel-title-row">
            <h2>Recent Logs</h2>
            <span id="logCountBadge" class="badge">0</span>
          </div>
          <div id="emptyState" class="empty-state">No logs yet. Hit <strong>Add Log</strong> and then click the map.</div>
          <div id="logList" class="log-list"></div>
        </div>
      </aside>
    </main>
  </div>

  <div id="formModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="logFormTitle">
      <div class="modal-header">
        <div>
          <h2 id="logFormTitle">Add Fishing Log</h2>
          <p id="logFormIntro" class="muted">Spot locked. Now add the details.</p>
        </div>
        <button id="closeFormBtn" class="icon-button" type="button" aria-label="Close form">×</button>
      </div>

      <form id="logForm" class="log-form">
        <div class="field-grid field-grid--two">
          <label>
            <span>Date</span>
            <input name="date" type="date" required>
          </label>
          <label>
            <span>Time</span>
            <input name="time" type="time">
          </label>
        </div>

        <div class="field-grid field-grid--two">
          <label>
            <span>Species</span>
            <input name="species" type="text" placeholder="Brown trout, steelhead, smallmouth..." required>
          </label>
          <label>
            <span>Water</span>
            <input name="waterbody" type="text" placeholder="Yellow Dog River">
          </label>
        </div>

        <div class="field-grid field-grid--two">
          <label>
            <span>Fly / Lure</span>
            <input name="flyLure" type="text" placeholder="Woolly Bugger, spinner, crawler...">
          </label>
          <label>
            <span>Color</span>
            <input name="color" type="text" placeholder="Olive, black, chartreuse...">
          </label>
        </div>

        <div class="field-grid field-grid--two">
          <label>
            <span>Retrieve speed</span>
            <select name="retrieveSpeed">
              <option value="">Select one</option>
              <option>Still</option>
              <option>Slow</option>
              <option>Medium</option>
              <option>Fast</option>
            </select>
          </label>
          <label>
            <span>Result</span>
            <select name="result">
              <option value="">Select one</option>
              <option>Caught</option>
              <option>Missed strike</option>
              <option>Follow</option>
              <option>No action</option>
            </select>
          </label>
        </div>

        <div class="field-grid field-grid--two">
          <label>
            <span>Air temp</span>
            <input name="airTemp" type="text" placeholder="52°F">
          </label>
          <label>
            <span>Water temp</span>
            <input name="waterTemp" type="text" placeholder="47°F">
          </label>
        </div>

        <label>
          <span>Notes</span>
          <textarea name="notes" rows="6" placeholder="Flow, weather, hatch, what worked, what didn't..."></textarea>
        </label>

        <div class="location-strip">
          <div>
            <div class="location-strip__label">Map location</div>
            <div id="locationText" class="location-strip__value">Not set</div>
          </div>
          <button id="repickLocationBtn" class="button" type="button">Pick New Spot</button>
        </div>

        <div class="form-actions">
          <button id="cancelFormBtn" class="button" type="button">Cancel</button>
          <button class="button button-primary" type="submit">Save Log</button>
        </div>
      </form>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
